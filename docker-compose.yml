services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: columbus
      POSTGRES_PASSWORD: columbus_dev
      POSTGRES_DB: columbus
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U columbus -d columbus"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://columbus:columbus_dev@db:5432/columbus
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-at-least-32-chars!
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

